name: InvictusSync
version: 1.0.0
main: lat.invictus.sync.InvictusSync
api-version: 1.20
author: INVICTUS Network
description: Sincroniza eventos del servidor con el Staff Portal de INVICTUS

depend: [RyzenStaff, AdvancedBan]

permissions:
  invictussync.admin:
    description: Permite recargar InvictusSync
    default: op
  invictussync.link:
    description: Permite vincular cuenta de Minecraft con el Staff Portal
    default: false

commands:
  invictussync:
    description: Recarga la configuracion de InvictusSync
    usage: /invictussync reload
    permission: invictussync.admin
  link:
    description: Vincula tu cuenta de Minecraft con el Staff Portal
    usage: /link
    permission: invictussync.link
